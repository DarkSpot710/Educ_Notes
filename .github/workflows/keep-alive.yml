name: Garder Supabase actif

on:
  schedule:
    # Toutes les 3 jours à minuit UTC — largement sous le seuil de pause
    - cron: '0 0 */3 * *'
  workflow_dispatch: {} # permet de le déclencher manuellement pour tester

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/niveaux?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
